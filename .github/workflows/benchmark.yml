name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      ibmmq:
        image: icr.io/ibm-messaging/mq:latest
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: passw0rd
          MQ_APP_PASSWORD: passw0rd
        ports:
          - 1414:1414
        options: >-
          --health-cmd "dspmq -m QM1 -n -o status | grep -q RUNNING"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 60s

    env:
      IBMMQ_CHANNEL: DEV.ADMIN.SVRCONN

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MQ listener
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 1414 2>/dev/null; then
              echo "MQ listener ready"
              exit 0
            fi
            sleep 2
          done
          echo "MQ listener not available"
          exit 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/nsbbench.slnx

      - name: Build
        run: dotnet build src/nsbbench.slnx -c Release --no-restore

      - name: nsbbench
        env:
          FORCE_COLOR: '1'
        run: dotnet run -c Release --no-build --project src/nsbbench -- benchmark --durable --tx receive,atomic -n 25000 -i 5 --json nsbbench.json

      - name: mqbench
        env:
          FORCE_COLOR: '1'
        run: dotnet run -c Release --no-build --project src/mqbench -- benchmark --durable --tx receive,atomic -n 25000 -i 5 --json mqbench.json

      - name: Summary
        if: always()
        run: |
          if [ -f mqbench.json ]; then
            jq -r '
              "## mqbench (raw IBM MQ)\n\n" +
              "**IBM MQ Client** " + .versions.ibmmqClient + "\n\n" +
              "| Scenario | Phase | Median/s | Avg/s | Avg Time |\n" +
              "|---|---|---:|---:|---:|\n" +
              (.results[] | "| \(.scenario) | \(.phase) | \(.medianRate | round) | \(.avgRate | round) | \(.avgSeconds)s |")
            ' mqbench.json >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f nsbbench.json ]; then
            jq -r '
              "## nsbbench (NServiceBus)\n\n" +
              "**NServiceBus** " + .versions.nservicebus + " | " +
              "**Transport** " + .versions.transport + " | " +
              "**IBM MQ Client** " + .versions.ibmmqClient + "\n\n" +
              "| Scenario | Phase | Median/s | Avg/s | Avg Time | Alloc/msg | GC 0/1/2 | Pause | CPU |\n" +
              "|---|---|---:|---:|---:|---|---|---|---|\n" +
              (.results[] | "| \(.scenario) | \(.phase) | \(.medianRate | round) | \(.avgRate | round) | \(.avgSeconds)s | \(.allocPerMsg) | \(.gc.gen0)/\(.gc.gen1)/\(.gc.gen2) | \(.pauseMs | round)ms | \(.cpuSec)s |")
            ' nsbbench.json >> "$GITHUB_STEP_SUMMARY"
          fi
