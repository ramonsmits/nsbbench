name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      ibmmq:
        image: icr.io/ibm-messaging/mq:latest
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: passw0rd
          MQ_APP_PASSWORD: passw0rd
        ports:
          - 1414:1414
        options: >-
          --health-cmd "dspmq -m QM1 -n -o status | grep -q RUNNING"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 60s

    env:
      IBMMQ_CHANNEL: DEV.ADMIN.SVRCONN

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MQ listener
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 1414 2>/dev/null; then
              echo "MQ listener ready"
              exit 0
            fi
            sleep 2
          done
          echo "MQ listener not available"
          exit 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/nsbbench.slnx

      - name: Build
        run: dotnet build src/nsbbench.slnx -c Release --no-restore

      - name: Benchmark
        env:
          FORCE_COLOR: '1'
        run: dotnet run -c Release --no-build --project src/nsbbench -- benchmark -n 4000 --json results.json

      - name: Summary
        if: always() && hashFiles('results.json') != ''
        run: |
          jq -r '
            "## Benchmark Results\n\n" +
            "**NServiceBus** " + .versions.nservicebus + " | " +
            "**Transport** " + .versions.transport + " | " +
            "**IBM MQ Client** " + .versions.ibmmqClient + "\n\n" +
            "| Scenario | Phase | Median/s | Avg/s | Alloc/msg | GC 0/1/2 | Pause | CPU |\n" +
            "|---|---|---:|---:|---|---|---|---|\n" +
            (.results[] | "| \(.scenario) | \(.phase) | \(.medianRate | round) | \(.avgRate | round) | \(.allocPerMsg) | \(.gc.gen0)/\(.gc.gen1)/\(.gc.gen2) | \(.pauseMs | round)ms | \(.cpuSec)s |")
          ' results.json >> "$GITHUB_STEP_SUMMARY"
