name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      ibmmq:
        image: icr.io/ibm-messaging/mq:latest
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: passw0rd
          MQ_APP_PASSWORD: passw0rd
        ports:
          - 1414:1414
        options: >-
          --health-cmd "dspmq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/nsbbench.slnx

      - name: Build
        run: dotnet build src/nsbbench.slnx -c Release --no-restore

      - name: Benchmark
        run: dotnet run -c Release --no-build --project src/nsbbench -- benchmark
